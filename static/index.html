<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falafel Brothers — Task Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.5; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header h1 span { color: #3b82f6; }
        .stats-bar { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
        .stat-pill { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 4px 10px; white-space: nowrap; }
        .stat-pill.high { border-color: #ef4444; color: #fca5a5; }
        .stat-pill .count { font-weight: 700; }
        .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .tab-btn { background: transparent; color: #94a3b8; border: 1px solid #475569; padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
        .tab-btn:hover { background: #334155; }
        .tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        #filter-category { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 5px 10px; border-radius: 6px; font-size: 12px; margin-left: auto; }
        .task-item { border: 1px solid #334155; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
        .task-item.item-done { border-color: #22c55e33; }
        /* Project row */
        .task-header { display: flex; align-items: center; padding: 12px; gap: 10px; cursor: pointer; }
        .task-header:hover { background: #334155; }
        .task-header.item-done { opacity: 0.7; }
        .task-header.item-done .task-title { text-decoration: line-through; }
        .task-content { flex: 1; min-width: 0; }
        .task-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
        .expand-btn { width: 24px; height: 24px; border: none; background: transparent; color: #64748b; cursor: pointer; border-radius: 4px; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
        .expand-btn.expanded { transform: rotate(90deg); }
        .expand-btn.hidden { visibility: hidden; }
        /* Task row (standalone) */
        .task-row { display: flex; align-items: center; padding: 10px 12px; gap: 10px; }
        .task-row:hover { background: #334155; }
        .task-row.item-done { opacity: 0.6; }
        .task-row.item-done .task-title { text-decoration: line-through; }
        .task-check { width: 22px; height: 22px; border: 2px solid #475569; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s; color: transparent; }
        .task-check:hover { border-color: #3b82f6; }
        .task-check.checked { background: #22c55e; border-color: #22c55e; color: #fff; }
        /* Tags */
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .tag.priority-high { background: #7f1d1d; color: #fca5a5; }
        .tag.priority-medium { background: #713f12; color: #fde68a; }
        .tag.priority-low { background: #14532d; color: #bbf7d0; }
        .tag.category { background: #312e81; color: #c7d2fe; }
        .tag.due { background: #4c1d95; color: #ddd6fe; }
        .tag.overdue { background: #7f1d1d; color: #fca5a5; }
        .tag.project { background: #164e63; color: #a5f3fc; }
        .tag.subtask-count { background: #1e293b; color: #94a3b8; }
        .tag.done-tag { background: #14532d; color: #86efac; }
        .tag.uncheck-hint { background: #475569; color: #94a3b8; }
        .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .task-header:hover .task-actions, .task-row:hover .task-actions { opacity: 1; }
        .action-btn { background: transparent; border: 1px solid #475569; color: #94a3b8; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .action-btn:hover { background: #475569; color: #fff; }
        /* Subtask panel */
        .subtask-panel { border-top: 1px solid #334155; background: #1a2335; display: none; }
        .subtask-panel.open { display: block; }
        .subtask-list { padding: 4px 0; }
        .subtask-row { display: flex; align-items: center; padding: 8px 16px; gap: 10px; }
        .subtask-row:hover { background: #334155; }
        .subtask-row.st-done .subtask-title { text-decoration: line-through; opacity: 0.5; }
        .subtask-check { width: 20px; height: 20px; border: 2px solid #475569; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; color: transparent; }
        .subtask-check:hover { border-color: #3b82f6; }
        .subtask-check.checked { background: #22c55e; border-color: #22c55e; color: #fff; }
        .subtask-title { flex: 1; font-size: 13px; }
        .subtask-meta { display: flex; gap: 4px; flex-shrink: 0; align-items: center; font-size: 10px; }
        .sub-actions { display: flex; gap: 3px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .subtask-row:hover .sub-actions { opacity: 1; }
        .add-subtask { display: flex; align-items: center; padding: 8px 16px; gap: 6px; border-top: 1px solid #334155; flex-wrap: wrap; }
        .add-subtask input[type="text"] { flex: 1; min-width: 120px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
        .add-subtask input[type="text"]:focus { outline: none; border-color: #3b82f6; }
        .add-subtask input[type="date"] { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 6px 8px; border-radius: 6px; font-size: 12px; }
        .add-subtask select { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 6px 8px; border-radius: 6px; font-size: 12px; }
        /* Quick add bars */
        .add-bar { display: flex; align-items: center; gap: 8px; padding: 12px; border: 1px dashed #475569; border-radius: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .add-bar input[type="text"] { flex: 1; min-width: 150px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        .add-bar input[type="text"]:focus, .add-bar input[type="date"]:focus { outline: none; border-color: #3b82f6; }
        .add-bar input[type="date"] { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 8px 10px; border-radius: 6px; font-size: 12px; }
        .btn { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .btn:hover { background: #2563eb; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #475569; }
        .btn-ghost:hover { background: #334155; }
        .btn-add-task { background: #16a34a; }
        .btn-add-task:hover { background: #15803d; }
        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 16px; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #1e293b; border: 1px solid #475569; border-radius: 12px; padding: 24px; width: 100%; max-width: 520px; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit; }
        .form-row textarea { resize: vertical; min-height: 50px; }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #3b82f6; }
        .form-row.half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .modal-subtasks { border-top: 1px solid #334155; margin-top: 16px; padding-top: 16px; }
        .modal-subtasks h3 { font-size: 13px; color: #94a3b8; margin-bottom: 10px; font-weight: 600; }
        .modal-subtask-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 13px; }
        .remove-sub { background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 2px 6px; }
        .remove-sub:hover { color: #ef4444; }
        .add-subtask-row { display: flex; gap: 6px; margin-top: 8px; }
        .add-subtask-row input { flex: 1; padding: 5px 8px; font-size: 12px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px; }
        .add-subtask-row input[type="date"] { width: 110px; }
        .add-subtask-row input:focus { outline: none; border-color: #3b82f6; }
        .add-subtask-row select { width: 70px; padding: 5px 6px; font-size: 12px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px; }
        .progress-bar { height: 3px; background: #334155; border-radius: 2px; overflow: hidden; width: 72px; }
        .progress-fill { height: 100%; background: #22c55e; transition: width 0.3s; }
        .empty-state { text-align: center; padding: 48px 20px; color: #64748b; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦊 <span>Task</span> Tracker</h1>
            <div class="stats-bar">
                <div class="stat-pill"><span class="count" id="stat-active">0</span> active</div>
                <div class="stat-pill high"><span class="count" id="stat-done">0</span> done</div>
            </div>
        </div>

        <div class="filters" id="main-tabs">
            <button class="tab-btn active" data-tab="projects" onclick="switchTab('projects', this)">Projects</button>
            <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks', this)">Tasks</button>
            <button class="tab-btn" data-tab="done" onclick="switchTab('done', this)">Done</button>
            <select id="filter-category" onchange="filterByCategory(this.value)">
                <option value="">All Categories</option>
            </select>
        </div>

        <!-- Add bars -->
        <div id="bar-project" class="add-bar">
            <input type="text" id="qp-input" placeholder="New project name..." onkeydown="if(event.key==='Enter'){event.preventDefault();quickProject()}">
            <input type="date" id="qp-date" title="Due date">
            <button class="btn btn-sm btn-add-task" onclick="quickProject()">+ Project</button>
            <button class="btn btn-sm btn-ghost" onclick="showProjectModal()">+ Full Form</button>
        </div>

        <div id="bar-task" class="add-bar hidden">
            <input type="text" id="qt-input" placeholder="Quick task..." onkeydown="if(event.key==='Enter'){event.preventDefault();quickTask()}">
            <input type="date" id="qt-date" title="Due (optional)">
            <select id="qt-prior"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>
            <button class="btn btn-sm btn-add-task" onclick="quickTask()">+ Add</button>
        </div>

        <div id="bar-done" class="add-bar hidden">
            <span style="color:#64748b;font-size:12px;">Click any item to uncheck it and move it back to Projects or Tasks</span>
        </div>

        <div id="view"></div>
    </div>

    <!-- Project Modal -->
    <div class="modal-overlay" id="modal-project">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h2 id="modal-title" style="font-size:16px;">New Project</h2>
                <button class="btn btn-ghost btn-sm" onclick="hideModal()">✕</button>
            </div>
            <form onsubmit="submitProjectForm(event)">
                <input type="hidden" id="form-id" value="">
                <div class="form-row"><label>Project Title *</label><input type="text" id="form-title" required placeholder="e.g. Update Foodex 2026 landing page"></div>
                <div class="form-row"><label>Description</label><textarea id="form-desc" placeholder="Details..."></textarea></div>
                <div class="form-row half">
                    <div><label>Priority</label><select id="form-pri"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
                    <div><label>Category</label><select id="form-cat"></select></div>
                </div>
                <div class="form-row half">
                    <div><label>Due Date *</label><input type="date" id="form-due" required></div>
                    <div><label>Project Tag</label><input type="text" id="form-tag" placeholder="e.g. Foodex 2026"></div>
                </div>
                <div class="modal-subtasks">
                    <h3>Subtasks <span style="font-weight:400;font-size:11px;color:#64748b;">(optional)</span></h3>
                    <div id="modal-subs"></div>
                    <div class="add-subtask-row">
                        <input type="text" id="ms-input" placeholder="Task name...">
                        <input type="date" id="ms-date">
                        <select id="ms-pri"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>
                        <button type="button" class="btn btn-sm btn-add-task" onclick="addModalSubtask()">+</button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn" id="form-submit-btn">Create Project</button>
                    <button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        var API = '/api';
        var categories = {};
        var currentCat = '';
        var currentTab = 'projects';
        var expandedParents = new Set();
        var modalSubtasks = [];

        async function init() {
            var resp = await fetch(API + '/categories');
            categories = await resp.json();
            var catSel = document.getElementById('form-cat');
            var filterCat = document.getElementById('filter-category');
            for (var key in categories) {
                catSel.appendChild(new Option(categories[key], key));
                filterCat.appendChild(new Option(categories[key], key));
            }
            loadView();
        }

        async function loadStats() {
            var s = await fetch(API + '/stats').then(function(r){ return r.json(); });
            document.getElementById('stat-active').textContent = s.active;
            document.getElementById('stat-done').textContent = s.completed;
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            expandedParents.clear();
            document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('bar-project').classList.toggle('hidden', tab !== 'projects');
            document.getElementById('bar-task').classList.toggle('hidden', tab !== 'tasks');
            document.getElementById('bar-done').classList.toggle('hidden', tab !== 'done');
            loadView();
        }

        function filterByCategory(val) { currentCat = val; loadView(); }

        async function loadView() {
            loadStats();
            var view = document.getElementById('view');
            var list;

            if (currentTab === 'projects') {
                list = await fetch(API + '/todos/projects').then(function(r){ return r.json(); });
                renderProjects(view, list);
            } else if (currentTab === 'tasks') {
                list = await fetch(API + '/todos/tasks').then(function(r){ return r.json(); });
                renderTasks(view, list);
            } else {
                list = await fetch(API + '/todos?status=done').then(function(r){ return r.json(); });
                renderDone(view, list);
            }
        }

        // ── Render Projects ─────────────────────────────
        function renderProjects(view, items) {
            if (!items.length) { view.innerHTML = '<div class="empty-state">No projects. Add one above.</div>'; return; }
            var now = new Date().toISOString().slice(0, 10);
            items.forEach(function(t) {
                var done = t.status === 'done';
                var overdue = t.due_date && t.due_date < now && !done;
                var prog = t.subtask_count && t.subtask_count.total > 0 ? Math.round((t.subtask_count.done / t.subtask_count.total) * 100) : 0;
                var hasSubs = t.subtask_count && t.subtask_count.total > 0;

                var meta = tag(t.priority, 'priority-' + t.priority) + catTag(t.category_name) + (t.due_date ? tag(t.due_date, overdue ? 'overdue' : 'due') : '') + (t.project ? tag(t.project, 'project') : '') + (done ? tag('✓ done', 'done-tag') : '') + (hasSubs ? tag(t.subtask_count.done + '/' + t.subtask_count.total, 'subtask-count') : '');
                if (hasSubs) meta += ' <div class="progress-bar" style="display:inline-block;vertical-align:middle;"><div class="progress-fill" style="width:' + prog + '%"></div></div>';

                var el = document.createElement('div');
                el.className = 'task-item' + (done ? ' item-done' : '');
                el.innerHTML = '<div class="task-header' + (done ? ' item-done' : '') + '" onclick="toggleParent(' + t.id + ')">'
                    + '<button class="expand-btn ' + (hasSubs ? (expandedParents.has(t.id) ? 'expanded' : '') : 'hidden') + '" onclick="event.stopPropagation(); toggleParent(' + t.id + ')">▶</button>'
                    + '<div class="task-content"><div class="task-title">' + esc(t.title) + '</div><div class="task-meta">' + meta + '</div></div>'
                    + '<div class="task-actions" onclick="event.stopPropagation()"><button class="action-btn" title="Edit" onclick="editProject(' + t.id + ')">✎</button><button class="action-btn" title="Delete" onclick="deleteItem(' + t.id + ')">🗑</button></div>'
                    + '</div>'
                    + '<div class="subtask-panel ' + (expandedParents.has(t.id) ? 'open' : '') + '" id="panel-' + t.id + '">'
                    + '<div class="subtask-list" id="subs-' + t.id + '">' + (expandedParents.has(t.id) ? '<div style="padding:8px 16px;">loading...</div>' : '') + '</div>'
                    + '<div class="add-subtask"><input type="text" placeholder="Add subtask..." id="si-' + t.id + '" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addSubtask(' + t.id + ')}"><input type="date" id="sd-' + t.id + '"><select id="sp-' + t.id + '"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select><button class="btn btn-sm btn-add-task" onclick="addSubtask(' + t.id + ')">Add</button></div></div>';
                view.appendChild(el);
                if (expandedParents.has(t.id)) loadSubs(t.id);
            });
        }

        // ── Render Tasks ────────────────────────────────
        function renderTasks(view, items) {
            if (!items.length) { view.innerHTML = '<div class="empty-state">No tasks. Add one above.</div>'; return; }
            items.forEach(function(t) {
                var done = t.status === 'done';
                var overdue = t.due_date && t.due_date < now && !done;
                var meta = tag(t.priority, 'priority-' + t.priority) + catTag(t.category_name) + (t.due_date ? tag(t.due_date, overdue ? 'overdue' : 'due') : '') + (t.project ? tag(t.project, 'project') : '');

                var el = document.createElement('div');
                el.className = 'task-item' + (done ? ' item-done' : '');
                el.innerHTML = '<div class="task-row' + (done ? ' item-done' : '') + '">'
                    + '<div class="task-check ' + (done ? 'checked' : '') + '" onclick="toggleTask(' + t.id + ', this)">' + (done ? '✓' : '') + '</div>'
                    + '<div class="task-content"><div class="task-title">' + esc(t.title) + '</div></div>'
                    + '<div class="task-meta">' + meta + '</div>'
                    + '<div class="task-actions"><button class="action-btn" title="Edit" onclick="editTask(' + t.id + ')">✎</button><button class="action-btn" title="Delete" onclick="deleteItem(' + t.id + ')">🗑</button></div></div>';
                view.appendChild(el);
            });
        }

        // ── Render Done ─────────────────────────────────
        function renderDone(view, items) {
            if (!items.length) { view.innerHTML = '<div class="empty-state">Nothing completed yet.</div>'; return; }
            items.forEach(function(t) {
                var isProj = t.item_type === 'project';
                var hasSubs = isProj && t.subtask_count && t.subtask_count.total > 0;

                if (isProj && hasSubs) {
                    // Render as expandable project (same as project view)
                    var prog = t.subtask_count ? Math.round((t.subtask_count.done / t.subtask_count.total) * 100) : 0;
                    var meta = tag('✓', 'done-tag') + catTag(t.category_name) + (t.due_date ? tag(t.due_date, 'due') : '') + tag(t.subtask_count.done + '/' + t.subtask_count.total, 'subtask-count') + '<div class="progress-bar" style="display:inline-block;vertical-align:middle;"><div class="progress-fill" style="width:' + prog + '%"></div></div>';
                    meta += ' ' + tag('click to uncheck', 'uncheck-hint');

                    var el = document.createElement('div');
                    el.className = 'task-item item-done';
                    el.innerHTML = '<div class="task-header item-done" onclick="toggleDoneParent(' + t.id + ')">'
                        + '<button class="expand-btn ' + (expandedParents.has(t.id) ? 'expanded' : '') + '" onclick="event.stopPropagation(); toggleDoneParent(' + t.id + ')">▶</button>'
                        + '<span style="font-size:16px;flex-shrink:0;">📂</span>'
                        + '<div class="task-content"><div class="task-title" style="text-decoration:line-through;">' + esc(t.title) + '</div><div class="task-meta">' + meta + '</div></div>'
                        + '</div>'
                        + '<div class="subtask-panel ' + (expandedParents.has(t.id) ? 'open' : '') + '" id="panel-' + t.id + '">'
                        + '<div class="subtask-list" id="subs-' + t.id + '">' + (expandedParents.has(t.id) ? '<div style="padding:8px 16px;">loading...</div>' : '') + '</div></div>';
                    view.appendChild(el);
                    if (expandedParents.has(t.id)) loadDoneSubs(t.id);
                } else {
                    // Standalone done item
                    var stMeta = tag('✓', 'done-tag') + catTag(t.category_name) + tag('click to uncheck', 'uncheck-hint');
                    var el2 = document.createElement('div');
                    el2.className = 'task-item item-done';
                    el2.innerHTML = '<div class="task-row item-done" onclick="uncheckItem(' + t.id + ')">'
                        + '<span style="font-size:16px;flex-shrink:0;">✅</span>'
                        + '<div class="task-content"><div class="task-title" style="text-decoration:line-through;">' + esc(t.title) + '</div></div>'
                        + '<div class="task-meta">' + stMeta + '</div></div>';
                    view.appendChild(el2);
                }
            });
        }

        function loadSubs(parentId) {
            fetch(API + '/todos?parent_id=' + parentId).then(function(r){ return r.json(); }).then(function(subs){ renderSubs(parentId, subs); });
        }

        function loadDoneSubs(parentId) {
            fetch(API + '/todos?parent_id=' + parentId + '&status=done').then(function(r){ return r.json(); }).then(function(subs){ renderDoneSubs(parentId, subs); });
        }

        function renderSubs(parentId, subs) {
            var c = document.getElementById('subs-' + parentId);
            if (!subs.length) { c.innerHTML = '<div style="padding:8px 16px;color:#64748b;font-size:12px;">No subtasks</div>'; return; }
            c.innerHTML = subs.map(function(s) {
                var done = s.status === 'done';
                return '<div class="subtask-row ' + (done ? 'st-done' : '') + '" id="sub-' + s.id + '">'
                    + '<div class="subtask-check ' + (done ? 'checked' : '') + '" onclick="toggleSubtask(' + s.id + ', this)">' + (done ? '✓' : '') + '</div>'
                    + '<span class="subtask-title">' + esc(s.title) + '</span>'
                    + '<div class="subtask-meta">' + tag(s.priority, 'priority-' + s.priority) + (s.due_date ? tag(s.due_date, 'due') : '') + '</div>'
                    + '<div class="sub-actions"><button class="action-btn" style="width:22px;height:22px;" onclick="deleteSub(' + parentId + ',' + s.id + ')" title="Delete">🗑</button></div></div>';
            }).join('');
        }

        function renderDoneSubs(parentId, subs) {
            var c = document.getElementById('subs-' + parentId);
            if (!subs.length) { c.innerHTML = '<div style="padding:8px 16px;color:#64748b;font-size:12px;">No subtasks</div>'; return; }
            c.innerHTML = subs.map(function(s) {
                return '<div class="subtask-row st-done" id="sub-' + s.id + '">'
                    + '<div class="subtask-check checked" onclick="uncheckItem(' + s.id + ')">✓</div>'
                    + '<span class="subtask-title" style="text-decoration:line-through;opacity:0.5;">' + esc(s.title) + '</span>'
                    + '<div class="subtask-meta">' + tag(s.priority, 'priority-' + s.priority) + (s.due_date ? tag(s.due_date, 'due') : '') + '</div></div>';
            }).join('');
        }

        function toggleParent(id) {
            if (expandedParents.has(id)) expandedParents.delete(id);
            else expandedParents.add(id);
            loadView();
        }

        function toggleDoneParent(id) {
            if (expandedParents.has(id)) expandedParents.delete(id);
            else { expandedParents.add(id); loadView(); }
        }

        async function toggleSubtask(subId, el) {
            var done = !el.classList.contains('checked');
            el.classList.toggle('checked', done);
            el.textContent = done ? '✓' : '';
            el.closest('.subtask-row').classList.toggle('st-done', done);
            await fetch(API + '/todos/' + subId + (done ? '/complete' : '/uncomplete'), { method: 'POST' });
            var panel = el.closest('.subtask-panel');
            var pid = panel ? parseInt(panel.id.replace('panel-', '')) : null;
            if (pid) { loadSubs(pid); refreshParent(pid); }
            loadStats();
        }

        async function addSubtask(pid) {
            var inp = document.getElementById('si-' + pid);
            var d = document.getElementById('sd-' + pid);
            if (!inp.value.trim()) return;
            await fetch(API + '/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ title: inp.value.trim(), priority: document.getElementById('sp-' + pid).value, parent_id: pid, due_date: d.value || null }) });
            inp.value = ''; d.value = '';
            loadSubs(pid); refreshParent(pid); loadStats();
        }

        async function deleteSub(pid, subId) {
            if (!confirm('Delete?')) return;
            await fetch(API + '/todos/' + subId, { method: 'DELETE' });
            loadSubs(pid); refreshParent(pid); loadStats();
        }

        async function refreshParent(pid) {
            var items = await fetch(API + '/todos/projects').then(function(r){ return r.json(); });
            var p = items.find(function(t){ return t.id === pid; });
            if (!p || !p.subtask_count) return;
            var el = document.getElementById('parent-' + pid);
            if (!el) return;
            var ce = el.querySelector('.tag.subtask-count');
            if (ce) ce.textContent = p.subtask_count.done + '/' + p.subtask_count.total;
            var pe = el.querySelector('.progress-fill');
            if (pe) pe.style.width = Math.round((p.subtask_count.done / p.subtask_count.total) * 100) + '%';
            if (p.status === 'done') { el.classList.add('item-done'); el.querySelector('.task-header').classList.add('item-done'); if(ce)ce.style.background='#14532d'; }
            else { el.classList.remove('item-done'); el.querySelector('.task-header').classList.remove('item-done'); if(ce)ce.style.background=''; }
        }

        // Quick add
        async function quickProject() {
            var inp = document.getElementById('qp-input');
            var d = document.getElementById('qp-date');
            if (!inp.value.trim()) return;
            if (!d.value) { d.focus(); return; }
            await fetch(API + '/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ title: inp.value.trim(), due_date: d.value, item_type: 'project' }) });
            inp.value = ''; d.value = '';
            loadView();
        }

        async function quickTask() {
            var inp = document.getElementById('qt-input');
            var d = document.getElementById('qt-date');
            if (!inp.value.trim()) return;
            await fetch(API + '/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ title: inp.value.trim(), priority: document.getElementById('qt-prior').value, due_date: d.value || null, item_type: 'task' }) });
            inp.value = ''; d.value = '';
            loadView();
        }

        async function toggleTask(id, el) {
            var done = !el.classList.contains('checked');
            el.classList.toggle('checked', done);
            el.textContent = done ? '✓' : '';
            var row = el.closest('.task-row');
            row.classList.toggle('item-done', done);
            var tt = row.querySelector('.task-title');
            tt.style.textDecoration = done ? 'line-through' : 'none';
            await fetch(API + '/todos/' + id + (done ? '/complete' : '/uncomplete'), { method: 'POST' });
            loadView();
        }

        // Uncheck from Done
        async function uncheckItem(id) {
            if (!confirm('Uncheck this and move it back to active?')) return;
            await fetch(API + '/todos/' + id + '/uncomplete', { method: 'POST' });
            loadView();
        }

        // Modal
        function showProjectModal() {
            document.getElementById('modal-title').textContent = 'New Project';
            document.getElementById('form-id').value = '';
            document.getElementById('form-title').value = '';
            document.getElementById('form-desc').value = '';
            document.getElementById('form-pri').value = 'medium';
            document.getElementById('form-cat').value = '';
            document.getElementById('form-due').value = '';
            document.getElementById('form-tag').value = '';
            document.getElementById('form-submit-btn').textContent = 'Create Project';
            modalSubtasks = []; renderModalSubs();
            document.getElementById('modal-project').classList.add('show');
        }
        function hideModal() { document.getElementById('modal-project').classList.remove('show'); }

        function editProject(id) {
            fetch(API + '/todos/' + id).then(function(r){ return r.json(); }).then(function(t) {
                document.getElementById('modal-title').textContent = 'Edit Project';
                document.getElementById('form-id').value = t.id;
                document.getElementById('form-title').value = t.title;
                document.getElementById('form-desc').value = t.description || '';
                document.getElementById('form-pri').value = t.priority || 'medium';
                document.getElementById('form-cat').value = t.category_id || '';
                document.getElementById('form-due').value = t.due_date || '';
                document.getElementById('form-tag').value = t.project || '';
                document.getElementById('form-submit-btn').textContent = 'Save';
                modalSubtasks = (t.subtasks || []).map(function(s){ return { _id: s.id, title: s.title, due_date: s.due_date||'', priority: s.priority||'medium' }; });
                renderModalSubs();
                document.getElementById('modal-project').classList.add('show');
            });
        }

        function editTask(id) {
            fetch(API + '/todos/' + id).then(function(r){ return r.json(); }).then(function(t) {
                document.getElementById('modal-title').textContent = 'Edit Task';
                document.getElementById('form-id').value = t.id;
                document.getElementById('form-title').value = t.title;
                document.getElementById('form-desc').value = t.description || '';
                document.getElementById('form-pri').value = t.priority || 'medium';
                document.getElementById('form-cat').value = t.category_id || '';
                document.getElementById('form-due').value = t.due_date || '';
                document.getElementById('form-tag').value = t.project || '';
                document.getElementById('form-submit-btn').textContent = 'Save';
                document.getElementById('modal-subs').innerHTML = '<div style="font-size:12px;color:#64748b;">Tasks have no subtasks</div>';
                document.getElementById('modal-project').classList.add('show');
            });
        }

        function addModalSubtask() {
            var inp = document.getElementById('ms-input');
            if (!inp.value.trim()) return;
            modalSubtasks.push({ title: inp.value.trim(), due_date: document.getElementById('ms-date').value||'', priority: document.getElementById('ms-pri').value });
            inp.value = ''; document.getElementById('ms-date').value = '';
            renderModalSubs(); inp.focus();
        }
        function removeModalSubtask(i) { modalSubtasks.splice(i, 1); renderModalSubs(); }
        function renderModalSubs() {
            var c = document.getElementById('modal-subs');
            if (!modalSubtasks.length) { c.innerHTML = '<div style="font-size:12px;color:#64748b;">No subtasks</div>'; return; }
            c.innerHTML = modalSubtasks.map(function(s, i) {
                return '<div class="modal-subtask-item"><span style="color:#64748b;width:16px;">' + (i+1) + '.</span><span style="flex:1;font-size:13px;">' + esc(s.title) + '</span>' + (s.due_date ? tag(s.due_date, 'due') : '') + tag(s.priority, 'priority-' + s.priority) + '<button class="remove-sub" onclick="removeModalSubtask(' + i + ')">✕</button></div>';
            }).join('');
        }

        async function submitProjectForm(e) {
            e.preventDefault();
            var id = document.getElementById('form-id').value;
            var data = { title: document.getElementById('form-title').value, description: document.getElementById('form-desc').value, priority: document.getElementById('form-pri').value, category_id: document.getElementById('form-cat').value ? parseInt(document.getElementById('form-cat').value) : null, project: document.getElementById('form-tag').value||null, due_date: document.getElementById('form-due').value };
            try {
                if (id) {
                    await fetch(API + '/todos/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
                } else {
                    var created = await fetch(API + '/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(Object.assign({}, data, {item_type:'project'})) }).then(function(r){ return r.json(); });
                    for (var i = 0; i < modalSubtasks.length; i++) {
                        if (modalSubtasks[i].title.trim()) {
                            await fetch(API + '/todos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title:modalSubtasks[i].title.trim(), priority:modalSubtasks[i].priority, parent_id:created.id, due_date:modalSubtasks[i].due_date||null}) });
                        }
                    }
                }
            } catch(err) { alert('Error'); return; }
            hideModal(); loadView();
        }

        async function deleteItem(id) {
            if (!confirm('Delete?')) return;
            await fetch(API + '/todos/' + id, { method: 'DELETE' });
            loadView();
        }

        function tag(txt, cls) { return '<span class="tag ' + esc(cls) + '">' + esc(txt) + '</span>'; }
        function catTag(name) { return name ? tag(name, 'category') : ''; }
        function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hideModal(); });
        init();
    </script>
</body>
</html>
