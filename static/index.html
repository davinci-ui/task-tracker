<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falafel Brothers - Task Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.5;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;margin-bottom:16px;border-bottom:1px solid #334155;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700}
.header h1 span{color:#3b82f6}
.stats-bar{display:flex;gap:12px;font-size:12px;flex-wrap:wrap}
.stat-pill{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:4px 10px;white-space:nowrap}
.stat-pill.high{border-color:#ef4444;color:#fca5a5}
.stat-pill .count{font-weight:700}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tab-btn{background:transparent;color:#94a3b8;border:1px solid #475569;padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.tab-btn:hover{background:#334155}
.tab-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
#cat-filter{background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:5px 10px;border-radius:6px;font-size:12px;margin-left:auto}
.task-item{border:1px solid #334155;border-radius:8px;margin-bottom:6px;overflow:hidden}
.task-item.item-done{border-color:#22c55e33}
.task-header{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer}
.task-header:hover{background:#334155}
.task-header.item-done{opacity:.7}
.task-header.item-done .task-title{text-decoration:line-through}
.task-content{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.expand-btn{width:24px;height:24px;border:none;background:transparent;color:#64748b;cursor:pointer;border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0}
.expand-btn.expanded{transform:rotate(90deg)}
.expand-btn.hidden{visibility:hidden}
.task-row{display:flex;align-items:center;padding:10px 12px;gap:10px}
.task-row:hover{background:#334155}
.task-row.item-done{opacity:.6}
.task-row.item-done .task-title{text-decoration:line-through}
.task-check{width:22px;height:22px;border:2px solid #475569;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;color:transparent}
.task-check:hover{border-color:#3b82f6}
.task-check.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.tag.priority-high{background:#7f1d1d;color:#fca5a5}
.tag.priority-medium{background:#713f12;color:#fde68a}
.tag.priority-low{background:#14532d;color:#bbf7d0}
.tag.category{background:#312e81;color:#c7d2fe}
.tag.due{background:#4c1d95;color:#ddd6fe}
.tag.overdue{background:#7f1d1d;color:#fca5a5}
.tag.project{background:#164e63;color:#a5f3fc}
.tag.subtask-count{background:#1e293b;color:#94a3b8}
.tag.done-tag{background:#14532d;color:#86efac}
.tag.uncheck-hint{background:#475569;color:#94a3b8}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-header:hover .task-actions,.task-row:hover .task-actions{opacity:1}
.action-btn{background:transparent;border:1px solid #475569;color:#94a3b8;width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.action-btn:hover{background:#475569;color:#fff}
.subtask-panel{border-top:1px solid #334155;background:#1a2335;display:none}
.subtask-panel.open{display:block}
.subtask-list{padding:4px 0}
.subtask-row{display:flex;align-items:center;padding:8px 16px;gap:10px}
.subtask-row:hover{background:#334155}
.subtask-row.st-done .subtask-title{text-decoration:line-through;opacity:.5}
.subtask-check{width:20px;height:20px;border:2px solid #475569;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;color:transparent}
.subtask-check:hover{border-color:#3b82f6}
.subtask-check.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.subtask-title{flex:1;font-size:13px}
.subtask-meta{display:flex;gap:4px;flex-shrink:0;align-items:center;font-size:10px}
.sub-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.subtask-row:hover .sub-actions{opacity:1}
.add-subtask{display:flex;align-items:center;padding:8px 16px;gap:6px;border-top:1px solid #334155;flex-wrap:wrap}
.add-subtask input[type=text]{flex:1;min-width:120px;background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:12px}
.add-subtask input[type=text]:focus{outline:none;border-color:#3b82f6}
.add-subtask input[type=date]{background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:6px 8px;border-radius:6px;font-size:12px}
.add-subtask select{background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:6px 8px;border-radius:6px;font-size:12px}
.add-bar{display:flex;align-items:center;gap:8px;padding:12px;border:1px dashed #475569;border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.add-bar input[type=text]{flex:1;min-width:150px;background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:8px 12px;border-radius:6px;font-size:14px}
.add-bar input[type=text]:focus,.add-bar input[type=date]:focus{outline:none;border-color:#3b82f6}
.add-bar input[type=date]{background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:8px 10px;border-radius:6px;font-size:12px}
.btn{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
.btn:hover{background:#2563eb}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #475569}
.btn-ghost:hover{background:#334155}
.btn-add{background:#16a34a}
.btn-add:hover{background:#15803d}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
.modal-overlay.show{display:flex}
.modal-content{background:#1e293b;border:1px solid #475569;border-radius:12px;padding:24px;width:100%;max-width:520px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit}
.form-row textarea{resize:vertical;min-height:50px}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#3b82f6}
.form-row.half{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.modal-subtasks{border-top:1px solid #334155;margin-top:16px;padding-top:16px}
.modal-subtasks h3{font-size:13px;color:#94a3b8;margin-bottom:10px;font-weight:600}
.modal-subtask-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px}
.remove-sub{background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:2px 6px}
.remove-sub:hover{color:#ef4444}
.subtask-row.add-row{display:flex;gap:6px;margin-top:8px}
.subtask-row.add-row input{flex:1;padding:5px 8px;font-size:12px;background:#0f172a;border:1px solid #475569;color:#e2e8f0;border-radius:6px}
.subtask-row.add-row input[type=date]{width:110px}
.subtask-row.add-row input:focus{outline:none;border-color:#3b82f6}
.subtask-row.add-row select{width:70px;padding:5px 6px;font-size:12px;background:#0f172a;border:1px solid #475569;color:#e2e8f0;border-radius:6px}
.progress-bar{height:3px;background:#334155;border-radius:2px;overflow:hidden;width:72px}
.progress-fill{height:100%;background:#22c55e;transition:width .3s}
.empty-state{text-align:center;padding:48px 20px;color:#64748b}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦊 <span>Task</span> Tracker</h1>
    <div class="stats-bar">
      <div class="stat-pill"><span class="count" id="st-active">0</span> active</div>
      <div class="stat-pill high"><span class="count" id="st-done">0</span> done</div>
    </div>
  </div>
  <div class="filters" id="main-tabs">
    <button class="tab-btn active" data-tab="projects" onclick="switchTab('projects',this)">Projects</button>
    <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks',this)">Tasks</button>
    <button class="tab-btn" data-tab="done" onclick="switchTab('done',this)">Done</button>
    <select id="cat-filter" onchange="filterCat(this.value)"><option value="">All Categories</option></select>
  </div>
  <div id="bar-proj" class="add-bar">
    <input type="text" id="qp-in" placeholder="New project name..." onkeydown="if(event.key==='Enter'){event.preventDefault();quickProject()}">
    <input type="date" id="qp-dt" title="Due date">
    <button class="btn btn-sm btn-add" onclick="quickProject()">+ Project</button>
    <button class="btn btn-sm btn-ghost" onclick="showProjModal()">+ Full Form</button>
  </div>
  <div id="bar-task" class="add-bar hidden">
    <input type="text" id="qt-in" placeholder="Quick task..." onkeydown="if(event.key==='Enter'){event.preventDefault();quickTask()}">
    <input type="date" id="qt-dt" title="Due (optional)">
    <select id="qt-pr"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>
    <button class="btn btn-sm btn-add" onclick="quickTask()">+ Add</button>
  </div>
  <div id="bar-done" class="add-bar hidden"><span style="color:#64748b;font-size:12px">Click ↩ to uncheck and move back to Projects or Tasks</span></div>
  <div id="view"></div>
</div>

<div class="modal-overlay" id="modal-proj">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 id="m-title" style="font-size:16px">New Project</h2>
      <button class="btn btn-ghost btn-sm" onclick="hideModal()">✕</button>
    </div>
    <form onsubmit="submitProj(event)">
      <input type="hidden" id="f-id" value="">
      <div class="form-row"><label>Project Title *</label><input type="text" id="f-ti" required placeholder="e.g. Update Foodex 2026 landing page"></div>
      <div class="form-row"><label>Description</label><textarea id="f-desc" placeholder="Details..."></textarea></div>
      <div class="form-row half">
        <div><label>Priority</label><select id="f-pr"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
        <div><label>Category</label><select id="f-cat"></select></div>
      </div>
      <div class="form-row half">
        <div><label>Due Date *</label><input type="date" id="f-due" required></div>
        <div><label>Project Tag</label><input type="text" id="f-tag" placeholder="e.g. Foodex 2026"></div>
      </div>
      <div class="modal-subtasks">
        <h3>Subtasks <span style="font-weight:400;font-size:11px;color:#64748b">(optional)</span></h3>
        <div id="m-subs"></div>
        <div class="subtask-row add-row">
          <input type="text" id="ms-in" placeholder="Task name...">
          <input type="date" id="ms-dt">
          <select id="ms-pr"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>
          <button type="button" class="btn btn-sm btn-add" onclick="addModalSub()">+</button>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn" id="f-btn">Create Project</button>
        <button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
const API='/api';
let cats={},curCat='',curTab='projects',expanded=new Set(),mSubs=[];

async function init(){
  const r=await fetch(API+'/categories');cats=await r.json();
  const s1=document.getElementById('f-cat'),s2=document.getElementById('cat-filter');
  for(const[k,v]of Object.entries(cats)){s1.appendChild(new Option(v,k));s2.appendChild(new Option(v,k))}
  loadView();
}

async function loadStats(){
  const s=await fetch(API+'/stats').then(r=>r.json());
  document.getElementById('st-active').textContent=s.active;
  document.getElementById('st-done').textContent=s.completed;
}

function switchTab(tab,btn){
  curTab=tab;expanded.clear();
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('bar-proj').classList.toggle('hidden',tab!=='projects');
  document.getElementById('bar-task').classList.toggle('hidden',tab!=='tasks');
  document.getElementById('bar-done').classList.toggle('hidden',tab!=='done');
  loadView();
}

function filterCat(v){curCat=v;loadView()}

async function loadView(){
  loadStats();
  const vw=document.getElementById('view');vw.innerHTML='';
  if(curTab==='projects') renderProjects(vw,await fetch(API+'/todos/projects'+q()).then(r=>r.json()));
  else if(curTab==='tasks') renderTasks(vw,await fetch(API+'/todos/tasks'+q()).then(r=>r.json()));
  else renderDone(vw,await fetch(API+'/todos?status=done'+q()).then(r=>r.json()));
}
function q(){return curCat?'?category_id='+curCat:''}

// ---- RENDER ----
function renderProjects(vw,items){
  if(!items.length){vw.innerHTML='<div class="empty-state">No projects. Add one above.</div>';return}
  const now=new Date().toISOString().slice(0,10);
  items.forEach(t=>{
    const dn=t.status==='done',ov=t.due_date&&t.due_date<now&&!dn;
    const hs=t.subtask_count&&t.subtask_count.total>0;
    const pr=hs?Math.round(t.subtask_count.done/t.subtask_count.total*100):0;
    let m=tag(t.priority,'priority-'+t.priority)+ct(t.category_name)+(t.due_date?tag(t.due_date,ov?'overdue':'due'):'')+(t.project?tag(t.project,'project'):'')+(dn?tag('✓ done','done-tag'):'')+(hs?tag(t.subtask_count.done+'/'+t.subtask_count.total,'subtask-count'):'');
    if(hs)m+=' <div class="progress-bar" style="display:inline-block;vertical-align:middle"><div class="progress-fill" style="width:'+pr+'%"></div></div>';
    const el=document.createElement('div');el.className='task-item'+(dn?' item-done':'');
    el.innerHTML='<div class="task-header'+(dn?' item-done':'')+'" onclick="toggleParent('+t.id+')">'
      +'<button class="expand-btn '+(hs?(expanded.has(t.id)?'expanded':''):'hidden')+'" onclick="event.stopPropagation();toggleParent('+t.id+')">▶</button>'
      +'<div class="task-content"><div class="task-title">'+esc(t.title)+'</div><div class="task-meta">'+m+'</div></div>'
      +'<div class="task-actions" onclick="event.stopPropagation()"><button class="action-btn" title="Edit" onclick="editProj('+t.id+')">✎</button><button class="action-btn" title="Delete" onclick="delItem('+t.id+')">🗑</button></div></div>'
      +'<div class="subtask-panel '+(expanded.has(t.id)?'open':'')+'" id="panel-'+t.id+'">'
      +'<div class="subtask-list" id="subs-'+t.id+'">'+(expanded.has(t.id)?'<div style="padding:8px 16px">loading...</div>':'')+'</div>'
      +'<div class="add-subtask"><input type="text" placeholder="Add subtask..." id="si-'+t.id+'" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addSub('+t.id+')}">'
      +'<input type="date" id="sd-'+t.id+'"><select id="sp-'+t.id+'"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>'
      +'<button class="btn btn-sm btn-add" onclick="addSub('+t.id+')">Add</button></div></div>';
    vw.appendChild(el);
    if(expanded.has(t.id)) loadSubs(t.id);
  });
}

function renderTasks(vw,items){
  if(!items.length){vw.innerHTML='<div class="empty-state">No tasks. Add one above.</div>';return}
  items.forEach(t=>{
    const dn=t.status==='done',ov=t.due_date&&t.due_date<new Date().toISOString().slice(0,10)&&!dn;
    const m=tag(t.priority,'priority-'+t.priority)+ct(t.category_name)+(t.due_date?tag(t.due_date,ov?'overdue':'due'):'')+(t.project?tag(t.project,'project'):'');
    const el=document.createElement('div');el.className='task-item'+(dn?' item-done':'');
    el.innerHTML='<div class="task-row'+(dn?' item-done':'')+'">'
      +'<div class="task-check '+(dn?'checked':'')+'" onclick="toggleTask('+t.id+',this)">'+(dn?'✓':'')+'</div>'
      +'<div class="task-content"><div class="task-title">'+esc(t.title)+'</div></div>'
      +'<div class="task-meta">'+m+'</div>'
      +'<div class="task-actions"><button class="action-btn" title="Edit" onclick="editTask('+t.id+')">✎</button><button class="action-btn" title="Delete" onclick="delItem('+t.id+')">🗑</button></div></div>';
    vw.appendChild(el);
  });
}

function renderDone(vw,items){
  if(!items.length){vw.innerHTML='<div class="empty-state">Nothing completed yet.</div>';return}
  items.forEach(t=>{
    const isP=t.item_type==='project',hs=isP&&t.subtask_count&&t.subtask_count.total>0;
    if(isP&&hs){
      const pr=Math.round(t.subtask_count.done/t.subtask_count.total*100);
      let m=tag('✓','done-tag')+ct(t.category_name)+(t.due_date?tag(t.due_date,'due'):'')
        +tag(t.subtask_count.done+'/'+t.subtask_count.total,'subtask-count')
        +'<div class="progress-bar" style="display:inline-block;vertical-align:middle"><div class="progress-fill" style="width:'+pr+'%"></div></div>';
      const el=document.createElement('div');el.className='task-item item-done';
      el.innerHTML='<div class="task-header item-done">'
        +'<button class="expand-btn '+(expanded.has(t.id)?'expanded':'')+'" onclick="event.stopPropagation();toggleDone('+t.id+')">▶</button>'
        +'<span style="font-size:16px;flex-shrink:0">📂</span>'
        +'<div class="task-content"><div class="task-title" style="text-decoration:line-through">'+esc(t.title)+'</div><div class="task-meta">'+m+'</div></div>'
        +'<button class="btn btn-sm btn-ghost" title="Uncheck" onclick="event.stopPropagation();uncheck('+t.id+')">↩</button></div>'
        +'<div class="subtask-panel '+(expanded.has(t.id)?'open':'')+'" id="panel-'+t.id+'">'
        +'<div class="subtask-list" id="subs-'+t.id+'">'+(expanded.has(t.id)?'<div style="padding:8px 16px">loading...</div>':'')+'</div></div>';
      vw.appendChild(el);
      if(expanded.has(t.id)) loadDoneSubs(t.id);
    } else {
      const el=document.createElement('div');el.className='task-item item-done';
      el.innerHTML='<div class="task-row item-done" onclick="uncheck('+t.id+')">'
        +'<span style="font-size:16px;flex-shrink:0">✅</span>'
        +'<div class="task-content"><div class="task-title" style="text-decoration:line-through">'+esc(t.title)+'</div></div>'
        +'<div class="task-meta">'+tag('✓','done-tag')+ct(t.category_name)+'</div></div>';
      vw.appendChild(el);
    }
  });
}

function renderSubs(pid,subs){
  const c=document.getElementById('subs-'+pid);
  if(!subs.length){c.innerHTML='<div style="padding:8px 16px;color:#64748b;font-size:12px">No subtasks</div>';return}
  c.innerHTML=subs.map(s=>{
    const dn=s.status==='done';
    return '<div class="subtask-row'+(dn?' st-done':'')+'" id="sub-'+s.id+'">'
      +'<div class="subtask-check '+(dn?'checked':'')+'" onclick="toggleSub('+s.id+',this)">'+(dn?'✓':'')+'</div>'
      +'<span class="subtask-title">'+esc(s.title)+'</span>'
      +'<div class="subtask-meta">'+tag(s.priority,'priority-'+s.priority)+(s.due_date?tag(s.due_date,'due'):'')+'</div>'
      +'<div class="sub-actions"><button class="action-btn" style="width:22px;height:22px" onclick="delSub('+pid+','+s.id+')" title="Delete">🗑</button></div></div>';
  }).join('');
}

function loadSubs(pid){fetch(API+'/todos?parent_id='+pid).then(r=>r.json()).then(s=>renderSubs(pid,s))}
function loadDoneSubs(pid){fetch(API+'/todos?parent_id='+pid).then(r=>r.json()).then(s=>renderSubs(pid,s))}

// ---- ACTIONS ----
function toggleParent(id){expanded.has(id)?expanded.delete(id):expanded.add(id);loadView()}
function toggleDone(id){expanded.has(id)?expanded.delete(id):expanded.add(id);loadView()}

async function toggleSub(sid,el){
  const dn=!el.classList.contains('checked');
  // Optimistic update
  el.classList.toggle('checked',dn);el.textContent=dn?'✓':'';
  el.closest('.subtask-row').classList.toggle('st-done',dn);
  await fetch(API+'/todos/'+sid+(dn?'/complete':'/uncomplete'),{method:'POST'});
  loadView();
}

async function addSub(pid){
  const i=document.getElementById('si-'+pid),d=document.getElementById('sd-'+pid);
  if(!i.value.trim())return;
  await fetch(API+'/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:i.value.trim(),priority:document.getElementById('sp-'+pid).value,parent_id:pid,due_date:d.value||null})});
  i.value='';d.value='';loadSubs(pid);loadView();
}

async function delSub(pid,sid){if(!confirm('Delete?'))return;await fetch(API+'/todos/'+sid,{method:'DELETE'});loadSubs(pid);loadView()}

async function quickProject(){
  const i=document.getElementById('qp-in'),d=document.getElementById('qp-dt');
  if(!i.value.trim())return;
  if(!d.value){d.focus();return}
  await fetch(API+'/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:i.value.trim(),due_date:d.value,item_type:'project'})});
  i.value='';d.value='';loadView();
}

async function quickTask(){
  const i=document.getElementById('qt-in'),d=document.getElementById('qt-dt');
  if(!i.value.trim())return;
  await fetch(API+'/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:i.value.trim(),priority:document.getElementById('qt-pr').value,due_date:d.value||null,item_type:'task'})});
  i.value='';d.value='';loadView();
}

async function toggleTask(id,el){
  const dn=!el.classList.contains('checked');
  el.classList.toggle('checked',dn);el.textContent=dn?'✓':'';
  const row=el.closest('.task-row');row.classList.toggle('item-done',dn);
  row.querySelector('.task-title').style.textDecoration=dn?'line-through':'none';
  await fetch(API+'/todos/'+id+(dn?'/complete':'/uncomplete'),{method:'POST'});
  // If parent was auto-completed (last subtask), reload projects
  loadView();
}

async function uncheck(id){
  if(!confirm('Uncheck and move back to active?'))return;
  await fetch(API+'/todos/'+id+'/uncomplete',{method:'POST'});
  switchTab('projects',document.querySelector('.tab-btn[data-tab=projects]'));
}

async function delItem(id){if(!confirm('Delete?'))return;await fetch(API+'/todos/'+id,{method:'DELETE'});loadView()}

// ---- MODAL ----
function showProjModal(){
  document.getElementById('m-title').textContent='New Project';
  document.getElementById('f-id').value='';document.getElementById('f-ti').value='';
  document.getElementById('f-desc').value='';document.getElementById('f-pr').value='medium';
  document.getElementById('f-cat').value='';document.getElementById('f-due').value='';
  document.getElementById('f-tag').value='';document.getElementById('f-btn').textContent='Create Project';
  mSubs=[];renderMS();document.getElementById('modal-proj').classList.add('show');
}
function hideModal(){document.getElementById('modal-proj').classList.remove('show')}

function editProj(id){
  fetch(API+'/todos/'+id).then(r=>r.json()).then(t=>{
    document.getElementById('m-title').textContent='Edit Project';
    document.getElementById('f-id').value=t.id;document.getElementById('f-ti').value=t.title;
    document.getElementById('f-desc').value=t.description||'';document.getElementById('f-pr').value=t.priority||'medium';
    document.getElementById('f-cat').value=t.category_id||'';document.getElementById('f-due').value=t.due_date||'';
    document.getElementById('f-tag').value=t.project||'';document.getElementById('f-btn').textContent='Save Changes';
    mSubs=(t.subtasks||[]).map(s=>({_id:s.id,title:s.title,due_date:s.due_date||'',priority:s.priority||'medium'}));
    renderMS();document.getElementById('modal-proj').classList.add('show');
  });
}
function editTask(id){ /* same but no subtask section */
  fetch(API+'/todos/'+id).then(r=>r.json()).then(t=>{
    document.getElementById('m-title').textContent='Edit Task';
    document.getElementById('f-id').value=t.id;document.getElementById('f-ti').value=t.title;
    document.getElementById('f-desc').value=t.description||'';document.getElementById('f-pr').value=t.priority||'medium';
    document.getElementById('f-cat').value=t.category_id||'';document.getElementById('f-due').value=t.due_date||'';
    document.getElementById('f-tag').value=t.project||'';document.getElementById('f-btn').textContent='Save';
    document.getElementById('m-subs').innerHTML='<div style="font-size:12px;color:#64748b">Tasks have no subtasks</div>';
    document.getElementById('modal-proj').classList.add('show');
  });
}

function addModalSub(){
  const i=document.getElementById('ms-in');if(!i.value.trim())return;
  mSubs.push({title:i.value.trim(),due_date:document.getElementById('ms-dt').value||'',priority:document.getElementById('ms-pr').value});
  i.value='';document.getElementById('ms-dt').value='';renderMS();i.focus();
}
function removeMS(i){mSubs.splice(i,1);renderMS()}
function renderMS(){
  const c=document.getElementById('m-subs');
  if(!mSubs.length){c.innerHTML='<div style="font-size:12px;color:#64748b">No subtasks</div>';return}
  c.innerHTML=mSubs.map((s,i)=>'<div class="modal-subtask-item"><span style="color:#64748b;width:16px">'+(i+1)+'.</span>'
    +'<span style="flex:1;font-size:13px">'+esc(s.title)+'</span>'
    +(s.due_date?tag(s.due_date,'due'):'')+tag(s.priority,'priority-'+s.priority)
    +'<button class="remove-sub" onclick="removeMS('+i+')">✕</button></div>').join('');
}

async function submitProj(e){
  e.preventDefault();
  const id=document.getElementById('f-id').value;
  const data={title:document.getElementById('f-ti').value,description:document.getElementById('f-desc').value,
    priority:document.getElementById('f-pr').value,
    category_id:document.getElementById('f-cat').value?parseInt(document.getElementById('f-cat').value):null,
    project:document.getElementById('f-tag').value||null,due_date:document.getElementById('f-due').value};
  if(id){
    await fetch(API+'/todos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  } else {
    const cr=await fetch(API+'/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({},{item_type:'project'},data))}).then(r=>r.json());
    for(const s of mSubs){if(s.title.trim())await fetch(API+'/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:s.title.trim(),priority:s.priority,parent_id:cr.id,due_date:s.due_date||null})})}
  }
  hideModal();loadView();
}

// ---- UTILS ----
function tag(t,c){return '<span class="tag '+esc(c)+'">'+esc(t)+'</span>'}
function ct(n){return n?tag(n,'category'):''}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal()});
init();
</script>
</body>
</html>
