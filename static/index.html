<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falafel Brothers — Task Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .header h1 span {
            color: #3b82f6;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            font-size: 13px;
        }

        .stat-pill {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-pill.high { border-color: #ef4444; color: #fca5a5; }
        .stat-pill .count { font-weight: 700; }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Panel */
        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .panel h2 {
            font-size: 16px;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
        }
        .btn:hover { background: #2563eb; }
        .btn-sm { padding: 6px 10px; font-size: 12px; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }
        .btn-ghost {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
        }
        .btn-ghost:hover { background: #334155; }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { background: #334155; }
        .filter-btn.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }

        /* Task list */
        .task-list { max-height: 60vh; overflow-y: auto; }

        .task-item {
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.15s;
        }
        .task-item:hover { background: #334155; }
        .task-item.done {
            opacity: 0.5;
        }
        .task-item.done .task-title { text-decoration: line-through; }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .task-title {
            font-size: 14px;
            font-weight: 500;
        }

        .task-tags {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #334155;
        }
        .tag.priority-high { background: #7f1d1d; color: #fca5a5; }
        .tag.priority-medium { background: #713f12; color: #fde68a; }
        .tag.priority-low { background: #14532d; color: #bbf7d0; }
        .tag.category { background: #312e81; color: #c7d2fe; }
        .tag.due { background: #4c1d95; color: #ddd6fe; }
        .tag.overdue { background: #7f1d1d; color: #fca5a5; }

        .task-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .action-btn:hover { background: #475569; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        /* Form */
        .form-row {
            margin-bottom: 12px;
        }

        .form-row label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 8px 12px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
        }

        .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .form-row textarea { resize: vertical; min-height: 60px; }

        .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal-content {
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Category color bar */
        .cat-bar {
            display: flex;
            gap: 2px;
            align-items: center;
            font-size: 11px;
        }
        .cat-bar-dot {
            width: 3px;
            height: 12px;
            border-radius: 2px;
        }

        /* Scroll */
        .task-list::-webkit-scrollbar { width: 6px; }
        .task-list::-webkit-scrollbar-track { background: transparent; }
        .task-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #475569;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦊 <span>Task</span> Tracker</h1>
            <div class="stats-bar">
                <div class="stat-pill"><span class="count" id="stat-active">0</span> active</div>
                <div class="stat-pill high"><span class="count" id="stat-high">0</span> high</div>
                <div class="stat-pill"><span class="count" id="stat-overdue">0</span> overdue</div>
                <button class="btn btn-sm" onclick="showModal('add')">+ Add Task</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- Main task list -->
            <div class="panel">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
                    <button class="filter-btn" data-filter="todo" onclick="setFilter('todo', this)">Todo</button>
                    <button class="filter-btn" data-filter="in-progress" onclick="setFilter('in-progress', this)">In Progress</button>
                    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Done</button>
                    <div style="flex: 1;"></div>
                    <select id="filter-category" style="background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:13px;" onchange="filterCategory(this.value)">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="task-list" id="task-list">
                    <div class="spinner" id="loading"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div>
                <div class="panel" style="margin-bottom: 16px;">
                    <h2>Sidebar Info</h2>
                    <div id="sidebar-content" style="font-size: 13px; color: #94a3b8; margin-top: 10px;">
                        <p>Click a task to see details, or add a new task to get started.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modal-add">
        <div class="modal-content">
            <div class="panel-header">
                <h2 id="modal-title">Add Task</h2>
                <button class="btn btn-ghost btn-sm" onclick="hideModals()">✕</button>
            </div>
            <form onsubmit="submitForm(event)">
                <input type="hidden" id="form-id" value="">
                <div class="form-row">
                    <label>Title *</label>
                    <input type="text" id="form-title" required placeholder="e.g. Update Foodex 2026 landing page">
                </div>
                <div class="form-row">
                    <label>Description</label>
                    <textarea id="form-description" placeholder="Details..."></textarea>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-row">
                        <label>Priority</label>
                        <select id="form-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Category</label>
                        <select id="form-category"></select>
                    </div>
                </div>
                <div class="form-row">
                    <label>Due Date</label>
                    <input type="date" id="form-due-date">
                </div>
                <div class="form-row">
                    <label>Project</label>
                    <input type="text" id="form-project" placeholder="e.g. Foodex 2026">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Save Task</button>
                    <button type="button" class="btn btn-ghost" onclick="hideModals()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api';

        let categories = {};
        let currentFilter = 'all';
        let currentCatFilter = '';
        let selectedTask = null;

        // ── Boot ──
        async function init() {
            const resp = await fetch(`${API}/categories`);
            categories = await resp.json();

            // Populate category dropdowns
            const sidebar = document.getElementById('sidebar-content');
            const filterCat = document.getElementById('filter-category');
            for (const [id, name] of Object.entries(categories)) {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = name;
                filterCat.appendChild(opt);

                const formOpt = document.getElementById('form-category');
                opt.textContent = name;
                formOpt.appendChild(new Option(name, id));
            }

            // Sidebar category breakdown
            renderSidebar();

            // Load todos
            loadTasks();
        }

        async function loadTasks() {
            const list = document.getElementById('task-list');
            const loading = document.getElementById('loading');
            if (!loading) list.innerHTML = '<div class="spinner" id="loading"></div>';
            else loading.style.display = 'block';

            let url = `${API}/todos?`;
            if (currentFilter !== 'all') url += `status=${currentFilter}&`;
            else url += `include_done=false&`;
            if (currentCatFilter) url += `category_id=${currentCatFilter}&`;

            try {
                const resp = await fetch(url);
                const tasks = await resp.json();
                renderTasks(tasks);
            } catch(e) {
                list.innerHTML = `<div class="empty-state">Failed to load tasks<br><small>${e.message}</small></div>`;
            }

            // Update stats
            const stats = await (await fetch(`${API}/stats`)).json();
            document.getElementById('stat-active').textContent = stats.active_todos;
            document.getElementById('stat-high').textContent = stats.high_priority;
            document.getElementById('stat-overdue').textContent = stats.overdue;
        }

        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            if (!tasks.length) {
                list.innerHTML = '<div class="empty-state">No tasks found</div>';
                return;
            }

            list.innerHTML = '';
            for (const t of tasks) {
                const el = document.createElement('div');
                el.className = `task-item ${t.status === 'done' ? 'done' : ''}`;

                const priorityClass = `priority-${t.priority}`;
                const now = new Date().toISOString().slice(0, 10);
                let dueTag = '';
                if (t.due_date) {
                    const isOverdue = t.due_date < now && t.status !== 'done';
                    dueTag = `<span class="tag ${isOverdue ? 'overdue' : 'due'}">due: ${t.due_date}</span>`;

                    // Update overdue stat if needed
                    if (isOverdue) {
                        const odEl = document.getElementById('stat-overdue');
                        odEl.textContent = parseInt(odEl.textContent) + 0;
                    }
                }

                el.innerHTML = `
                    <div class="task-header">
                        <span class="task-title">${esc(t.title)}</span>
                        <div class="task-actions">
                            ${t.status !== 'done' ? `<button class="action-btn" title="Complete" onclick="completeTask(${t.id})">✓</button>` : ''}
                            <button class="action-btn" title="Edit" onclick="showModal('edit', ${t.id})">✎</button>
                            <button class="action-btn" title="Delete" onclick="deleteTask(${t.id})">🗑</button>
                        </div>
                    </div>
                    <div class="task-tags">
                        <span class="tag ${priorityClass}">${t.priority}</span>
                        ${t.category_name ? `<span class="tag category">${esc(t.category_name)}</span>` : ''}
                        ${dueTag}
                        ${t.project ? `<span class="tag">${esc(t.project)}</span>` : ''}
                    </div>
                `;
                list.appendChild(el);
            }
        }

        async function renderSidebar() {
            const stats = await (await fetch(`${API}/stats`)).json();
            const content = document.getElementById('sidebar-content');

            // Active categories
            const activeCats = stats.categories.filter(c => c.active > 0).slice(0, 8);
            if (!activeCats.length) {
                content.innerHTML = '<p>No tasks yet. Click <b>+ Add Task</b> to start.</p>';
                return;
            }

            content.innerHTML = `
                <div style="font-size:12px;margin-bottom:8px;color:#64748b;">Active Categories</div>
                ${activeCats.map(c => `
                    <div style="display:flex;justify-content:space-between;padding:4px 0;">
                        <span>${c.name}</span>
                        <span style="color:#64748b;">${c.active}</span>
                    </div>
                `).join('')}
                <div style="border-top:1px solid #334155;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:600;">
                    <span>Total</span>
                    <span>${stats.active_todos} active</span>
                </div>
            `;
        }

        // ── Modal ──
        function showModal(mode, taskId) {
            const modal = document.getElementById('modal-add');
            document.getElementById('modal-title').textContent = mode === 'edit' ? 'Edit Task' : 'Add Task';

            if (mode === 'edit' && taskId) {
                document.getElementById('form-id').value = taskId;
                // Fetch task data
                fetch(`${API}/todos/${taskId}`).then(r => r.json()).then(t => {
                    document.getElementById('form-title').value = t.title || '';
                    document.getElementById('form-description').value = t.description || '';
                    document.getElementById('form-priority').value = t.priority || 'medium';
                    document.getElementById('form-category').value = t.category_id || '';
                    document.getElementById('form-due-date').value = t.due_date || '';
                    document.getElementById('form-project').value = t.project || '';
                });
            } else {
                document.getElementById('form-id').value = '';
                document.getElementById('form-title').value = '';
                document.getElementById('form-description').value = '';
                document.getElementById('form-priority').value = 'medium';
                document.getElementById('form-category').value = '';
                document.getElementById('form-due-date').value = '';
                document.getElementById('form-project').value = '';
            }

            modal.classList.add('show');
            document.getElementById('form-title').focus();
        }

        function hideModals() {
            document.getElementById('modal-add').classList.remove('show');
        }

        // ── Form Submit ──
        async function submitForm(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('form-title').value,
                description: document.getElementById('form-description').value,
                priority: document.getElementById('form-priority').value,
                category_id: document.getElementById('form-category').value ? parseInt(document.getElementById('form-category').value) : null,
                due_date: document.getElementById('form-due-date').value || null,
                project: document.getElementById('form-project').value || null,
            };

            const taskId = document.getElementById('form-id').value;

            try {
                const url = taskId ? `${API}/todos/${taskId}` : `${API}/todos`;
                const method = taskId ? 'PUT' : 'POST';
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
            } catch(e) {
                alert('Error saving task');
                return;
            }

            hideModals();
            loadTasks();
            renderSidebar();
        }

        // ── Actions ──
        async function completeTask(id) {
            try {
                await fetch(`${API}/todos/${id}/complete`, { method: 'POST' });
                loadTasks();
                renderSidebar();
            } catch(e) { alert('Error completing task'); }
        }

        async function deleteTask(id) {
            if (!confirm('Delete this task?')) return;
            try {
                await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
                loadTasks();
                renderSidebar();
            } catch(e) { alert('Error deleting task'); }
        }

        // ── Filters ──
        function setFilter(filter, el) {
            currentFilter = filter;

            // Update active state
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            loadTasks();
        }

        function filterCategory(val) {
            currentCatFilter = val;
            loadTasks();
        }

        // ── Utility ──
        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ── Keyboard shortcuts ──
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') hideModals();
            if (e.key === 'n' && e.metaKey) { e.preventDefault(); showModal('add'); }
        });

        // ── Boot ──
        init();
    </script>
</body>
</html>
