<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falafel Brothers — Task Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.5; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header h1 span { color: #3b82f6; }
        .stats-bar { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
        .stat-pill { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 4px 10px; white-space: nowrap; }
        .stat-pill.high { border-color: #ef4444; color: #fca5a5; }
        .stat-pill .count { font-weight: 700; }
        .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .tab-btn { background: transparent; color: #94a3b8; border: 1px solid #475569; padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
        .tab-btn:hover { background: #334155; }
        .tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        #filter-category { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 5px 10px; border-radius: 6px; font-size: 12px; margin-left: auto; }
        .task-item { border: 1px solid #334155; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
        .task-item.item-done { border-color: #22c55e33; }
        /* Project item */
        .task-header { display: flex; align-items: center; padding: 12px; gap: 10px; cursor: pointer; }
        .task-header:hover { background: #334155; }
        .task-header.item-done { opacity: 0.6; }
        .task-header.item-done .task-title { text-decoration: line-through; }
        .task-content { flex: 1; min-width: 0; }
        .task-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
        .expand-btn { width: 24px; height: 24px; border: none; background: transparent; color: #64748b; cursor: pointer; border-radius: 4px; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
        .expand-btn.expanded { transform: rotate(90deg); }
        .expand-btn.hidden { visibility: hidden; }
        /* Task item (standalone) */
        .task-row { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .task-row:hover { background: #334155; }
        .task-row.item-done { opacity: 0.6; }
        .task-row.item-done .task-title { text-decoration: line-through; }
        .task-check { width: 22px; height: 22px; border: 2px solid #475569; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s; color: transparent; }
        .task-check:hover { border-color: #3b82f6; }
        .task-check.checked { background: #22c55e; border-color: #22c55e; color: #fff; }
        .task-row .task-content { flex: 1; min-width: 0; }
        .task-row .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .task-row:hover .task-actions { opacity: 1; }
        /* Shared: tags */
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .tag.priority-high { background: #7f1d1d; color: #fca5a5; }
        .tag.priority-medium { background: #713f12; color: #fde68a; }
        .tag.priority-low { background: #14532d; color: #bbf7d0; }
        .tag.category { background: #312e81; color: #c7d2fe; }
        .tag.due { background: #4c1d95; color: #ddd6fe; }
        .tag.overdue { background: #7f1d1d; color: #fca5a5; }
        .tag.project { background: #164e63; color: #a5f3fc; }
        .tag.subtask-count { background: #1e293b; color: #94a3b8; }
        .tag.done-tag { background: #14532d; color: #86efac; }
        .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .task-header:hover .task-actions { opacity: 1; }
        .task-row .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .task-row:hover .task-actions { opacity: 1; }
        .action-btn { background: transparent; border: 1px solid #475569; color: #94a3b8; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .action-btn:hover { background: #475569; color: #fff; }
        /* Subtask panel */
        .subtask-panel { border-top: 1px solid #334155; background: #1a2335; display: none; }
        .subtask-panel.open { display: block; }
        .subtask-list { padding: 4px 0; }
        .subtask-row { display: flex; align-items: center; padding: 8px 16px; gap: 10px; }
        .subtask-row:hover { background: #334155; }
        .subtask-row.st-done .subtask-title { text-decoration: line-through; opacity: 0.5; }
        .subtask-check { width: 20px; height: 20px; border: 2px solid #475569; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; color: transparent; }
        .subtask-check:hover { border-color: #3b82f6; }
        .subtask-check.checked { background: #22c55e; border-color: #22c55e; color: #fff; }
        .subtask-title { flex: 1; font-size: 13px; }
        .subtask-meta { display: flex; gap: 4px; flex-shrink: 0; align-items: center; font-size: 10px; }
        .sub-actions { display: flex; gap: 3px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .subtask-row:hover .sub-actions { opacity: 1; }
        .add-subtask { display: flex; align-items: center; padding: 8px 16px; gap: 6px; border-top: 1px solid #334155; flex-wrap: wrap; }
        .add-subtask input[type="text"] { flex: 1; min-width: 120px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
        .add-subtask input[type="text"]:focus { outline: none; border-color: #3b82f6; }
        .add-subtask input[type="date"] { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 6px 8px; border-radius: 6px; font-size: 12px; }
        .add-subtask select { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 6px 8px; border-radius: 6px; font-size: 12px; }
        /* Quick add task */
        .add-task-bar { display: flex; align-items: center; gap: 8px; padding: 12px; border: 1px dashed #475569; border-radius: 8px; margin-bottom: 12px; }
        .add-task-bar input { flex: 1; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        .add-task-bar input:focus { outline: none; border-color: #3b82f6; }
        .add-task-bar select { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 8px 10px; border-radius: 6px; font-size: 12px; }
        .add-task-bar input[type="date"] { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 8px 10px; border-radius: 6px; font-size: 12px; }
        .empty-state { text-align: center; padding: 48px 20px; color: #64748b; }
        .btn { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .btn:hover { background: #2563eb; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #475569; }
        .btn-ghost:hover { background: #334155; }
        .btn-add-task { background: #16a34a; }
        .btn-add-task:hover { background: #15803d; }
        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 16px; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #1e293b; border: 1px solid #475569; border-radius: 12px; padding: 24px; width: 100%; max-width: 520px; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit; }
        .form-row textarea { resize: vertical; min-height: 50px; }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #3b82f6; }
        .form-row.half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
        .modal-subtasks { border-top: 1px solid #334155; margin-top: 16px; padding-top: 16px; }
        .modal-subtasks h3 { font-size: 13px; color: #94a3b8; margin-bottom: 10px; font-weight: 600; }
        .modal-subtask-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 13px; }
        .modal-subtask-item .remove-sub { background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 2px 6px; }
        .modal-subtask-item .remove-sub:hover { color: #ef4444; }
        .add-subtask-row { display: flex; gap: 6px; margin-top: 8px; }
        .add-subtask-row input { flex: 1; padding: 5px 8px; font-size: 12px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px; }
        .add-subtask-row input[type="date"] { width: 110px; }
        .add-subtask-row input:focus { outline: none; border-color: #3b82f6; }
        .add-subtask-row select { width: 70px; padding: 5px 6px; font-size: 12px; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px; }
        .progress-bar { height: 3px; background: #334155; border-radius: 2px; margin-top: 6px; overflow: hidden; width: 72px; }
        .progress-fill { height: 100%; background: #22c55e; border-radius: 2px; transition: width 0.3s; }
        .spinner { width: 20px; height: 20px; border: 2px solid #475569; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦊 <span>Task</span> Tracker</h1>
            <div class="stats-bar">
                <div class="stat-pill"><span class="count" id="stat-projects">0</span> projects</div>
                <div class="stat-pill"><span class="count" id="stat-tasks">0</span> tasks</div>
                <div class="stat-pill"><span class="count" id="stat-done">0</span> done</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="filters" id="main-tabs">
            <button class="tab-btn active" data-tab="projects" onclick="switchTab('projects', this)">Projects</button>
            <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks', this)">Tasks</button>
            <button class="tab-btn" data-tab="done" onclick="switchTab('done', this)">Done</button>
            <select id="filter-category" onchange="filterByCategory(this.value)">
                <option value="">All Categories</option>
            </select>
        </div>

        <!-- Project Add Bar -->
        <div id="project-add-bar" class="add-task-bar">
            <input type="text" id="quick-project-input" placeholder="New project name..." onkeydown="if(event.key==='Enter'){event.preventDefault();quickAddProject()}">
            <input type="date" id="quick-project-date" title="Due date">
            <button class="btn btn-sm btn-add-task" onclick="quickAddProject()">+ Project</button>
            <button class="btn btn-sm btn-ghost" onclick="showProjectModal()">+ Full Form</button>
        </div>

        <!-- Task Add Bar -->
        <div id="task-add-bar" class="add-task-bar hidden">
            <input type="text" id="quick-task-input" placeholder="Quick task..." onkeydown="if(event.key==='Enter'){event.preventDefault();quickAddTask()}">
            <input type="date" id="quick-task-date" title="Due (optional)">
            <select id="quick-task-prior">
                <option value="low">Low</option>
                <option value="medium" selected>Mid</option>
                <option value="high">High</option>
            </select>
            <button class="btn btn-sm btn-add-task" onclick="quickAddTask()">+ Add</button>
        </div>

        <!-- Done add bar -->
        <div id="done-add-bar" class="add-task-bar hidden">
            <input type="text" id="quick-done-input" placeholder="Completed item..." disabled style="opacity:0.4">
            <span style="color:#64748b;font-size:12px;">Completed items appear here automatically</span>
        </div>

        <div id="task-list"><div class="spinner"></div></div>
    </div>

    <!-- Full Project Modal -->
    <div class="modal-overlay" id="modal-project">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h2 id="modal-project-title" style="font-size:16px;">New Project</h2>
                <button class="btn btn-ghost btn-sm" onclick="hideProjectModal()">✕</button>
            </div>
            <form onsubmit="submitProjectForm(event)">
                <input type="hidden" id="form-id" value="">
                <div class="form-row">
                    <label>Project Title *</label>
                    <input type="text" id="form-title" required placeholder="e.g. Update Foodex 2026 landing page">
                </div>
                <div class="form-row">
                    <label>Description</label>
                    <textarea id="form-description" placeholder="Details..."></textarea>
                </div>
                <div class="form-row half">
                    <div><label>Priority</label><select id="form-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
                    <div><label>Category</label><select id="form-category"></select></div>
                </div>
                <div class="form-row half">
                    <div><label>Due Date *</label><input type="date" id="form-due-date" required></div>
                    <div><label>Project Tag</label><input type="text" id="form-project-tag" placeholder="e.g. Foodex 2026"></div>
                </div>
                <div class="modal-subtasks">
                    <h3>Subtasks <span style="font-weight:400;font-size:11px;color:#64748b;">(optional)</span></h3>
                    <div id="modal-subs"></div>
                    <div class="add-subtask-row">
                        <input type="text" id="modal-sub-input" placeholder="Task name...">
                        <input type="date" id="modal-sub-date" title="Due (optional)">
                        <select id="modal-sub-priority"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>
                        <button type="button" class="btn btn-sm btn-add-task" onclick="addModalSubtask()">+</button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn" id="form-submit-btn">Create Project</button>
                    <button type="button" class="btn btn-ghost" onclick="hideProjectModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api';
        let categories = {};
        let currentCat = '';
        let currentTab = 'projects';
        let expandedParents = new Set();
        let modalSubtasks = [];

        async function init() {
            const resp = await fetch(API + '/categories');
            categories = await resp.json();
            var catSel = document.getElementById('form-category');
            var filterCat = document.getElementById('filter-category');
            for (var key in categories) {
                catSel.appendChild(new Option(categories[key], key));
                filterCat.appendChild(new Option(categories[key], key));
            }
            loadView();
        }

        async function loadStats() {
            var stats = await fetch(API + '/stats').then(function(r){ return r.json(); });
            document.getElementById('stat-projects').textContent = stats.projects_active;
            document.getElementById('stat-tasks').textContent = stats.tasks_active;
            document.getElementById('stat-done').textContent = stats.completed;
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            expandedParents.clear();
            document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            // Show/hide add bars
            document.getElementById('project-add-bar').classList.toggle('hidden', tab !== 'projects');
            document.getElementById('task-add-bar').classList.toggle('hidden', tab !== 'tasks');
            document.getElementById('done-add-bar').classList.toggle('hidden', tab !== 'done');
            loadView();
        }

        async function loadView() {
            loadStats();
            var list = document.getElementById('task-list');
            list.innerHTML = '<div class="spinner"></div>';

            if (currentTab === 'projects') {
                var url = API + '/todos/projects?';
                if (currentCat) url += 'category_id=' + currentCat + '&';
                var items = await fetch(url).then(function(r){ return r.json(); });
                renderProjects(list, items);
            } else if (currentTab === 'tasks') {
                var url = API + '/todos/tasks?';
                if (currentCat) url += 'category_id=' + currentCat + '&';
                var items = await fetch(url).then(function(r){ return r.json(); });
                renderTasks(list, items);
            } else {
                var url = API + '/todos?status=done&include_done=true&';
                if (currentCat) url += 'category_id=' + currentCat + '&';
                var items = await fetch(url).then(function(r){ return r.json(); });
                renderDone(list, items);
            }
        }

        function filterByCategory(val) { currentCat = val; loadView(); }

        // ── Render Projects ─────────────────────────────
        function renderProjects(list, items) {
            if (!items.length) { list.innerHTML = '<div class="empty-state">No projects yet. Add one above.</div>'; return; }
            var now = new Date().toISOString().slice(0,10);
            items.forEach(function(t) {
                var isDone = t.status === 'done';
                var isOverdue = t.due_date && t.due_date < now && !isDone;
                var prog = t.subtask_count && t.subtask_count.total > 0 ? Math.round((t.subtask_count.done / t.subtask_count.total) * 100) : 0;
                var hasSubs = t.subtask_count && t.subtask_count.total > 0;

                var meta = '<span class="tag priority-' + t.priority + '">' + t.priority + '</span>';
                if (t.category_name) meta += ' <span class="tag category">' + esc(t.category_name) + '</span>';
                if (t.due_date) meta += ' <span class="tag ' + (isOverdue ? 'overdue' : 'due') + '">' + t.due_date + '</span>';
                if (t.project) meta += ' <span class="tag project">' + esc(t.project) + '</span>';
                if (isDone) meta += ' <span class="tag done-tag">✓ done</span>';
                if (hasSubs) meta += ' <span class="tag subtask-count">' + t.subtask_count.done + '/' + t.subtask_count.total + '</span>';
                if (hasSubs) meta += ' <div class="progress-bar" style="display:inline-block;vertical-align:middle;"><div class="progress-fill" style="width:' + prog + '%"></div></div>';

                var el = document.createElement('div');
                el.className = 'task-item' + (isDone ? ' item-done' : '');
                el.id = 'parent-' + t.id;
                el.innerHTML = '<div class="task-header' + (isDone ? ' item-done' : '') + '" onclick="toggleParent(' + t.id + ')">'
                    + '<button class="expand-btn ' + (hasSubs ? (expandedParents.has(t.id) ? 'expanded' : '') : 'hidden') + '" onclick="event.stopPropagation(); toggleParent(' + t.id + ')">▶</button>'
                    + '<div class="task-content"><div class="task-title">' + esc(t.title) + '</div><div class="task-meta">' + meta + '</div></div>'
                    + '<div class="task-actions" onclick="event.stopPropagation()">'
                    + '<button class="action-btn" title="Edit" onclick="editProject(' + t.id + ')">✎</button>'
                    + '<button class="action-btn" title="Delete" onclick="deleteItem(' + t.id + ')">🗑</button>'
                    + '</div></div>'
                    + '<div class="subtask-panel ' + (expandedParents.has(t.id) ? 'open' : '') + '" id="panel-' + t.id + '">'
                    + '<div class="subtask-list" id="subs-' + t.id + '">' + (expandedParents.has(t.id) ? '<div class="spinner" style="margin:12px auto;width:14px;height:14px;"></div>' : '') + '</div>'
                    + '<div class="add-subtask">'
                    + '<input type="text" placeholder="Add subtask..." id="sub-input-' + t.id + '" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addSubtask(' + t.id + ')}">'
                    + '<input type="date" id="sub-date-' + t.id + '">'
                    + '<select id="sub-prior-' + t.id + '"><option value="low">Low</option><option value="medium" selected>Mid</option><option value="high">High</option></select>'
                    + '<button class="btn btn-sm btn-add-task" onclick="addSubtask(' + t.id + ')">Add</button>'
                    + '</div></div>';
                list.appendChild(el);
                if (expandedParents.has(t.id)) loadSubtasks(t.id);
            });
        }

        // ── Render Tasks (standalone) ─────────────────────
        function renderTasks(list, items) {
            if (!items.length) { list.innerHTML = '<div class="empty-state">No tasks. Add one above.</div>'; return; }
            var now = new Date().toISOString().slice(0,10);
            items.forEach(function(t) {
                var isDone = t.status === 'done';
                var isOverdue = t.due_date && t.due_date < now && !isDone;
                var meta = '<span class="tag priority-' + t.priority + '">' + t.priority + '</span>';
                if (t.category_name) meta += ' <span class="tag category">' + esc(t.category_name) + '</span>';
                if (t.due_date) meta += ' <span class="tag ' + (isOverdue ? 'overdue' : 'due') + '">' + t.due_date + '</span>';
                if (t.project) meta += ' <span class="tag project">' + esc(t.project) + '</span>';

                var el = document.createElement('div');
                el.className = 'task-item' + (isDone ? ' item-done' : '');
                el.id = 'task-' + t.id;
                el.innerHTML = '<div class="task-row' + (isDone ? ' item-done' : '') + '">'
                    + '<div class="task-check ' + (isDone ? 'checked' : '') + '" onclick="toggleTask(' + t.id + ', this)">' + (isDone ? '✓' : '') + '</div>'
                    + '<div class="task-content"><div class="task-title">' + esc(t.title) + '</div></div>'
                    + '<div class="task-meta">' + meta + '</div>'
                    + '<div class="task-actions">'
                    + '<button class="action-btn" title="Edit" onclick="editTask(' + t.id + ')">✎</button>'
                    + '<button class="action-btn" title="Delete" onclick="deleteItem(' + t.id + ')">🗑</button>'
                    + '</div></div>';
                list.appendChild(el);
            });
        }

        // ── Render Done ───────────────────────────────
        function renderDone(list, items) {
            if (!items.length) { list.innerHTML = '<div class="empty-state">Nothing completed yet.</div>'; return; }
            items.forEach(function(t) {
                var isProject = t.item_type === 'project';
                var meta = '<span class="tag done-tag">✓</span>';
                if (t.category_name) meta += ' <span class="tag category">' + esc(t.category_name) + '</span>';
                if (t.due_date) meta += ' <span class="tag due">' + t.due_date + '</span>';
                if (t.subtask_count) meta += ' <span class="tag subtask-count">' + t.subtask_count.done + '/' + t.subtask_count.total + '</span>';

                var icon = isProject ? '📂' : '✓';
                var el = document.createElement('div');
                el.className = 'task-item item-done';
                el.innerHTML = '<div class="task-row item-done">'
                    + '<span style="font-size:16px;flex-shrink:0;">' + icon + '</span>'
                    + '<div class="task-content"><div class="task-title" style="text-decoration:line-through;">' + esc(t.title) + '</div></div>'
                    + '<div class="task-meta">' + meta + '</div></div>';
                list.appendChild(el);
            });
        }

        // ── Project subtasks ────────────────────────────
        async function loadSubtasks(parentId) {
            var container = document.getElementById('subs-' + parentId);
            var subs = await fetch(API + '/todos?parent_id=' + parentId).then(function(r){ return r.json(); });
            renderSubtasks(parentId, subs);
        }

        function renderSubtasks(parentId, subs) {
            var container = document.getElementById('subs-' + parentId);
            if (!subs.length) { container.innerHTML = '<div style="padding:8px 16px;color:#64748b;font-size:12px;">No subtasks</div>'; return; }
            container.innerHTML = subs.map(function(s) {
                var isDone = s.status === 'done';
                var stMeta = '<span class="tag priority-' + s.priority + '">' + s.priority + '</span>';
                if (s.due_date) stMeta += ' <span class="tag due">' + s.due_date + '</span>';
                return '<div class="subtask-row ' + (isDone ? 'st-done' : '') + '" id="sub-' + s.id + '">'
                    + '<div class="subtask-check ' + (isDone ? 'checked' : '') + '" onclick="toggleSubtask(' + s.id + ', this)">' + (isDone ? '✓' : '') + '</div>'
                    + '<span class="subtask-title">' + esc(s.title) + '</span>'
                    + '<div class="subtask-meta">' + stMeta + '</div>'
                    + '<div class="sub-actions"><button class="action-btn" style="width:22px;height:22px;" onclick="deleteSubtask(' + parentId + ',' + s.id + ')" title="Delete">🗑</button></div>'
                    + '</div>';
            }).join('');
        }

        function toggleParent(id) {
            if (expandedParents.has(id)) { expandedParents.delete(id); }
            else { expandedParents.add(id); }
            loadView();
        }

        async function toggleSubtask(subId, checkEl) {
            var isDone = !checkEl.classList.contains('checked');
            checkEl.classList.toggle('checked', isDone);
            checkEl.textContent = isDone ? '✓' : '';
            var row = checkEl.closest('.subtask-row');
            row.classList.toggle('st-done', isDone);
            try {
                await fetch(API + '/todos/' + subId + (isDone ? '/complete' : '/uncomplete'), { method: 'POST' });
                var panel = checkEl.closest('.subtask-panel');
                var parentId = panel ? parseInt(panel.id.replace('panel-', '')) : null;
                if (parentId) { await loadSubtasks(parentId); refreshParentProgress(parentId); }
                loadView();
            } catch(e) { loadView(); }
        }

        async function addSubtask(parentId) {
            var input = document.getElementById('sub-input-' + parentId);
            var dateEl = document.getElementById('sub-date-' + parentId);
            if (!input.value.trim()) return;
            await fetch(API + '/todos', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title: input.value.trim(), priority: document.getElementById('sub-prior-' + parentId).value, parent_id: parentId, due_date: dateEl.value || null })
            });
            input.value = ''; dateEl.value = '';
            await loadSubtasks(parentId);
            refreshParentProgress(parentId);
            loadView();
        }

        async function deleteSubtask(parentId, subId) {
            if (!confirm('Delete?')) return;
            await fetch(API + '/todos/' + subId, { method: 'DELETE' });
            await loadSubtasks(parentId);
            refreshParentProgress(parentId);
            loadView();
        }

        async function refreshParentProgress(parentId) {
            var todos = await fetch(API + '/todos/projects').then(function(r){ return r.json(); });
            var parent = todos.find(function(t){ return t.id === parentId; });
            if (!parent || !parent.subtask_count) return;
            var el = document.getElementById('parent-' + parentId);
            if (!el) return;
            var countEl = el.querySelector('.tag.subtask-count');
            if (countEl) countEl.textContent = parent.subtask_count.done + '/' + parent.subtask_count.total;
            var progEl = el.querySelector('.progress-fill');
            if (progEl) progEl.style.width = Math.round((parent.subtask_count.done / parent.subtask_count.total) * 100) + '%';
            if (parent.status === 'done') { el.classList.add('item-done'); el.querySelector('.task-header').classList.add('item-done'); if(countEl)countEl.style.background='#14532d'; }
        }

        // ── Quick add / standalone ─────────────────────
        async function quickAddProject() {
            var input = document.getElementById('quick-project-input');
            var dateEl = document.getElementById('quick-project-date');
            if (!input.value.trim()) return;
            if (!dateEl.value) { input.focus(); return; }
            await fetch(API + '/todos', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ title: input.value.trim(), due_date: dateEl.value, item_type: 'project' })
            });
            input.value = ''; dateEl.value = '';
            loadView();
        }

        async function quickAddTask() {
            var input = document.getElementById('quick-task-input');
            var dateEl = document.getElementById('quick-task-date');
            if (!input.value.trim()) return;
            await fetch(API + '/todos', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ title: input.value.trim(), priority: document.getElementById('quick-task-prior').value, due_date: dateEl.value || null, item_type: 'task' })
            });
            input.value = ''; dateEl.value = '';
            loadView();
        }

        async function toggleTask(id, checkEl) {
            var isDone = !checkEl.classList.contains('checked');
            checkEl.classList.toggle('checked', isDone);
            checkEl.textContent = isDone ? '✓' : '';
            var el = checkEl.closest('.task-row');
            el.classList.toggle('item-done', isDone);
            if (isDone) el.querySelector('.task-title').style.textDecoration = 'line-through';
            else el.querySelector('.task-title').style.textDecoration = 'none';
            try {
                await fetch(API + '/todos/' + id + (isDone ? '/complete' : '/uncomplete'), { method: 'POST' });
                loadView();
            } catch(e) { loadView(); }
        }

        // ── Full Project Modal ─────────────────────────
        function showProjectModal() {
            document.getElementById('modal-project-title').textContent = 'New Project';
            document.getElementById('form-id').value = '';
            document.getElementById('form-title').value = '';
            document.getElementById('form-description').value = '';
            document.getElementById('form-priority').value = 'medium';
            document.getElementById('form-category').value = '';
            document.getElementById('form-due-date').value = '';
            document.getElementById('form-project-tag').value = '';
            document.getElementById('form-submit-btn').textContent = 'Create Project';
            modalSubtasks = [];
            renderModalSubtasks();
            document.getElementById('modal-project').classList.add('show');
        }
        function hideProjectModal() { document.getElementById('modal-project').classList.remove('show'); }
        function editProject(id) {
            fetch(API + '/todos/' + id).then(function(r){ return r.json(); }).then(function(t) {
                document.getElementById('modal-project-title').textContent = 'Edit Project';
                document.getElementById('form-id').value = t.id;
                document.getElementById('form-title').value = t.title;
                document.getElementById('form-description').value = t.description || '';
                document.getElementById('form-priority').value = t.priority || 'medium';
                document.getElementById('form-category').value = t.category_id || '';
                document.getElementById('form-due-date').value = t.due_date || '';
                document.getElementById('form-project-tag').value = t.project || '';
                document.getElementById('form-submit-btn').textContent = 'Save';
                modalSubtasks = (t.subtasks || []).map(function(s){ return { _id: s.id, title: s.title, due_date: s.due_date||'', priority: s.priority||'medium' }; });
                renderModalSubtasks();
                document.getElementById('modal-project').classList.add('show');
            });
        }
        function editTask(id) {
            fetch(API + '/todos/' + id).then(function(r){ return r.json(); }).then(function(t) {
                document.getElementById('modal-project-title').textContent = 'Edit Task';
                document.getElementById('form-id').value = t.id;
                document.getElementById('form-title').value = t.title;
                document.getElementById('form-description').value = t.description || '';
                document.getElementById('form-priority').value = t.priority || 'medium';
                document.getElementById('form-category').value = t.category_id || '';
                document.getElementById('form-due-date').value = t.due_date || '';
                document.getElementById('form-project-tag').value = t.project || '';
                document.getElementById('form-submit-btn').textContent = 'Save';
                document.getElementById('modal-subs').innerHTML = '<div style="font-size:12px;color:#64748b;">Tasks have no subtasks</div>';
                document.getElementById('modal-project').classList.add('show');
            });
        }
        function addModalSubtask() {
            var input = document.getElementById('modal-sub-input');
            if (!input.value.trim()) return;
            modalSubtasks.push({ title: input.value.trim(), due_date: document.getElementById('modal-sub-date').value||'', priority: document.getElementById('modal-sub-priority').value });
            input.value = ''; document.getElementById('modal-sub-date').value = '';
            renderModalSubtasks(); input.focus();
        }
        function removeModalSubtask(idx) { modalSubtasks.splice(idx, 1); renderModalSubtasks(); }
        function renderModalSubtasks() {
            var list = document.getElementById('modal-subs');
            if (!modalSubtasks.length) { list.innerHTML = '<div style="font-size:12px;color:#64748b;">No subtasks</div>'; return; }
            list.innerHTML = modalSubtasks.map(function(s, i) {
                return '<div class="modal-subtask-item"><span style="color:#64748b;width:16px;">' + (i+1) + '.</span>'
                    + '<span style="flex:1;font-size:13px;">' + esc(s.title) + '</span>'
                    + (s.due_date ? '<span class="tag due" style="font-size:10px;">' + s.due_date + '</span>' : '')
                    + '<span class="tag priority-' + s.priority + '" style="font-size:10px;">' + s.priority + '</span>'
                    + '<button class="remove-sub" onclick="removeModalSubtask(' + i + ')">✕</button></div>';
            }).join('');
        }
        async function submitProjectForm(e) {
            e.preventDefault();
            var id = document.getElementById('form-id').value;
            var data = { title: document.getElementById('form-title').value, description: document.getElementById('form-description').value, priority: document.getElementById('form-priority').value, category_id: document.getElementById('form-category').value ? parseInt(document.getElementById('form-category').value) : null, project: document.getElementById('form-project-tag').value||null, due_date: document.getElementById('form-due-date').value };
            try {
                if (id) { await fetch(API + '/todos/' + id, { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }); }
                else {
                    var created = await fetch(API + '/todos', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(Object.assign({}, data, {item_type:'project'})) }).then(function(r){ return r.json(); });
                    for (var i = 0; i < modalSubtasks.length; i++) {
                        if (modalSubtasks[i].title.trim()) {
                            await fetch(API + '/todos', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title:modalSubtasks[i].title.trim(), priority:modalSubtasks[i].priority, parent_id:created.id, due_date:modalSubtasks[i].due_date||null}) });
                        }
                    }
                }
            } catch(err) { alert('Error'); return; }
            hideProjectModal(); loadView();
        }

        async function deleteItem(id) {
            if (!confirm('Delete?')) return;
            await fetch(API + '/todos/' + id, { method:'DELETE' });
            loadView();
        }

        function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hideProjectModal(); });
        init();
    </script>
</body>
</html>
